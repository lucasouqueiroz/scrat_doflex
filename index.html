<!DOCTYPE html>
<html lang='pt-BR'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <meta name='description' content='Scrat do Flex - serviços de entregas com atendimento ágil, confiável e compromisso com eficiência em cada solicitação.'>
  <title>Scrat do Flex | Links Oficiais</title>
  <style>
    :root {
      --card: rgba(10,20,32,.88);
      --line: rgba(255,255,255,.12);
      --text: #f5f8fc;
      --muted: #b8c7d9;
      --ice: #d9efff;
      --ig-a: #6a1b9a;
      --ig-b: #c13584;
      --ig-c: #e1306c;
      --ig-d: #833ab4;
      --wa: #128c4a;
      --wa-dark: #0b6b38;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Arial, Helvetica, sans-serif;
      background: #0c1724;
      color: var(--text);
      overflow-x: hidden;
      position: relative;
    }
    .bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: blur(1px) brightness(.24) saturate(.92);
      transform: scale(1.03);
      z-index: 0;
      pointer-events: none;
    }
    .overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, rgba(7,15,24,.72), rgba(7,15,24,.94));
      z-index: 1;
      pointer-events: none;
    }
    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 16px;
      position: relative;
      z-index: 2;
    }
    .shell { width: 100%; max-width: 430px; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 18px 60px rgba(0,0,0,.35);
      backdrop-filter: blur(12px);
    }
    .hero { position: relative; height: 220px; overflow: hidden; }
    .hero img { width: 100%; height: 100%; object-fit: cover; object-position: center 24%; display: block; }
    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(10,18,29,.18), rgba(10,18,29,.30) 35%, rgba(12,23,36,.92) 100%);
    }
    .badge {
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 2;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(12,23,36,.76);
      border: 1px solid rgba(255,255,255,.14);
      color: var(--ice);
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .content { padding: 22px 22px 24px; }
    h1 { margin: 0; font-size: 30px; line-height: 1.05; letter-spacing: .01em; }
    .bio { margin: 14px 0 22px; color: var(--muted); line-height: 1.55; font-size: 15px; }
    .links { display: grid; gap: 12px; }
    .btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-radius: 18px;
      text-decoration: none;
      color: var(--text);
      border: 1px solid rgba(255,255,255,.12);
      transition: transform .18s ease, filter .18s ease, border-color .18s ease;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.05);
    }
    .btn:hover { transform: translateY(-2px); filter: brightness(1.04); border-color: rgba(255,255,255,.18); }
    .instagram {
      background: linear-gradient(90deg, #4b164c 0%, #7b1f6f 25%, #a52276 55%, #5d3fd3 100%);
      color: #fff;
      font-weight: 700;
    }
    .whatsapp {
      background: linear-gradient(180deg, var(--wa), var(--wa-dark));
      color: #fff;
      font-weight: 700;
    }
    .label { display: flex; flex-direction: column; align-items: flex-start; }
    .title { font-size: 16px; font-weight: 700; }
    .desc { font-size: 13px; opacity: .92; margin-top: 2px; }
    .icon { width: 38px; height: 38px; border-radius: 12px; display: grid; place-items: center; background: rgba(255,255,255,.12); flex: 0 0 38px; }
    .footer { margin-top: 18px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,.08); color: var(--muted); font-size: 13px; text-align: center; }
  </style>
</head>
